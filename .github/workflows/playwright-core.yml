name: Playwright Tests

on:
  workflow_call:
    inputs:
      project:
        description: 'Playwright --project filter (e.g. "chromium"). Empty = all 3 browsers.'
        type: string
        required: false
        default: ''
      timeout-minutes:
        description: 'Job timeout in minutes. Bump for full 3-browser runs.'
        type: number
        required: false
        default: 30

jobs:
  test:
    name: Playwright
    timeout-minutes: ${{ inputs.timeout-minutes }}
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
      cancel-in-progress: ${{ github.ref_name != 'main' }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'

    - name: Restore Playwright browsers cache
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install deps & browsers
      run: |
        npm ci
        if [ -n "${{ inputs.project }}" ]; then
          npx playwright install --with-deps "${{ inputs.project }}"
        else
          npx playwright install --with-deps
        fi

    - name: Run Playwright tests
      env:
        CI: 'true'
      run: |
        if [ -n "${{ inputs.project }}" ]; then
          npx playwright test --reporter=html --project="${{ inputs.project }}"
        else
          npm run test:report
        fi

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report${{ inputs.project && format('-{0}', inputs.project) || '' }}
        path: |
          playwright-report/
          playwright-report.json
        retention-days: 30
